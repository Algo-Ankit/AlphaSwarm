# Tooling config for AlphaSwarm. Packaging is handled via requirements.txt;
# this file configures ruff (lint) + black (format) + pytest for CI.

[tool.black]
line-length = 100
target-version = ["py311"]
skip-string-normalization = true       # keep existing quote style — no churn

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["alembic", "node_modules", "frontend", "scratch_refactor.py"]

[tool.ruff.lint]
# Conservative ruleset: pyflakes (F), a subset of pycodestyle (E), and import
# sorting (I). Expand over time — this is the launch baseline.
select = ["E", "F", "I", "W"]
ignore = [
    "E501",   # line length is handled by black, not the linter
    "E741",   # ambiguous variable names (l, O) — present in some math code
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]               # re-exports
"tests/*" = ["F401", "F811"]           # fixtures / intentional shadowing

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
