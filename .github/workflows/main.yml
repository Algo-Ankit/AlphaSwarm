name: CI

# Runs formatting checks + the test suite on every PR to main (and on pushes to main).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need history to diff against the base branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: python -m pip install --upgrade pip ruff black

      # Enforce formatting on NEW Python files this PR adds. The legacy tree is not
      # yet fully black/ruff-clean, so checking modified files would fail on
      # pre-existing style in files only incidentally touched. Gating on added
      # files holds all new code to the standard and keeps the baseline green.
      # Adopt the standard repo-wide via a dedicated `chore: format` PR later.
      - name: Determine added Python files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
          fi
          FILES=$(git diff --name-only --diff-filter=A "$BASE"...HEAD -- '*.py' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Added Python files: ${FILES:-<none>}"

      - name: Ruff (lint changed files)
        if: steps.changed.outputs.files != ''
        run: ruff check ${{ steps.changed.outputs.files }}

      - name: Ruff (format check changed files)
        if: steps.changed.outputs.files != ''
        run: ruff format --check ${{ steps.changed.outputs.files }}

      - name: Black (format check changed files)
        if: steps.changed.outputs.files != ''
        run: black --check ${{ steps.changed.outputs.files }}

  test:
    name: Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alphaswarm
          POSTGRES_PASSWORD: alphaswarm
          POSTGRES_DB: alphaswarm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alphaswarm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Point the app at the CI service containers.
      DATABASE_URL: postgresql+asyncpg://alphaswarm:alphaswarm@localhost:5432/alphaswarm
      DATABASE_SYNC_URL: postgresql://alphaswarm:alphaswarm@localhost:5432/alphaswarm
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      CELERY_TASK_ALWAYS_EAGER: "true"
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest -q
