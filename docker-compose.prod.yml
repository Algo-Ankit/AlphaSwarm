# AlphaSwarm — Production Docker Compose
#
# Start:   docker compose -f docker-compose.prod.yml up -d
# Scale:   docker compose -f docker-compose.prod.yml up -d --scale api=3
# Logs:    docker compose -f docker-compose.prod.yml logs -f api
# Migrate: docker compose -f docker-compose.prod.yml exec api alembic upgrade head

services:

  # ── Nginx — load balancer + reverse proxy ───────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── FastAPI — horizontally scalable ─────────────────────────
  # Scale: docker compose -f docker-compose.prod.yml up -d --scale api=3
  # Each container runs 1 uvicorn worker. Nginx load-balances across all.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://alphaswarm:alphaswarm@postgres:5432/alphaswarm
      DATABASE_SYNC_URL: postgresql://alphaswarm:alphaswarm@postgres:5432/alphaswarm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # No port exposed — all traffic goes through nginx

  # ── Celery worker — one worker process handles multiple strategy tasks ──
  # Concurrency set to 4: 4 parallel strategy bots per worker container.
  # Scale containers for more capacity: --scale worker=2
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A app.core.celery_app.celery_app worker
      -Q trading_tasks
      --concurrency=4
      --max-tasks-per-child=50
      --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://alphaswarm:alphaswarm@postgres:5432/alphaswarm
      DATABASE_SYNC_URL: postgresql://alphaswarm:alphaswarm@postgres:5432/alphaswarm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app.celery_app inspect ping -d celery@$$HOSTNAME --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat — periodic scheduler (runs ONE instance only) ──
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info --schedule /var/lib/celerybeat/celerybeat-schedule
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      # Persist the beat schedule DB so the last-run-time of each periodic task
      # survives container restarts — otherwise a restart re-fires every cron
      # task (duplicate snapshots, double reconciliations) on the next tick.
      - celerybeat_data:/var/lib/celerybeat
    healthcheck:
      disable: true
    depends_on:
      - redis
    restart: unless-stopped
    # NEVER scale this beyond 1 — duplicate beat instances cause duplicate tasks

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alphaswarm
      POSTGRES_USER: alphaswarm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alphaswarm_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"  # bind to localhost only — not exposed to internet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphaswarm -d alphaswarm"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # bind to localhost only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
  celerybeat_data:
