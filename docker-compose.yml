services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alphaswarm
      POSTGRES_USER: alphaswarm
      POSTGRES_PASSWORD: alphaswarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
