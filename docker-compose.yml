services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alphaswarm
      POSTGRES_USER: alphaswarm
      POSTGRES_PASSWORD: alphaswarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # schema.sql is the reference document — Alembic owns schema creation via: alembic upgrade head
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphaswarm -d alphaswarm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
