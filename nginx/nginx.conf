# AlphaSwarm — Nginx reverse proxy + load balancer
# Handles: REST API, WebSocket (live market data), rate limiting

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Upstream: all API container instances ────────────────
    # Docker Compose internal DNS resolves "api" to all scaled containers.
    # least_conn sends each new request to the container with fewest active connections.
    upstream alphaswarm_api {
        least_conn;
        server api:8000;
        keepalive 32;  # persistent upstream connections (reduces TCP overhead)
    }

    # ── Rate limiting zones ──────────────────────────────────
    # market data: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=market_data:10m rate=60r/m;
    # auth endpoints: 10 req/min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # general API: 300 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=300r/m;

    # ── Performance ──────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;  # don't expose nginx version

    # Gzip for API responses (JSON compresses ~80%)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json text/plain text/css application/javascript;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Server ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security headers ─────────────────────────────────
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # ── Health check (no rate limit, used by load balancer) ──
        location = /health {
            proxy_pass http://alphaswarm_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ── Auth endpoints (strict rate limit) ───────────────
        location ~ ^/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://alphaswarm_api;
            include /etc/nginx/proxy_params;
        }

        # ── Market data endpoints (per-minute rate limit) ────
        location ~ ^/v1/market/ {
            limit_req zone=market_data burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://alphaswarm_api;
            include /etc/nginx/proxy_params;
        }

        # ── WebSocket: live bar streaming ────────────────────
        # Long-lived connections — no rate limit, read timeout extended
        location ~ ^/v1/ws/ {
            proxy_pass http://alphaswarm_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;   # 24h for persistent market data streams
            proxy_send_timeout 86400s;
            proxy_buffering off;         # disable buffering for real-time data
        }

        # ── All other API routes ──────────────────────────────
        location / {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;
            proxy_pass http://alphaswarm_api;
            include /etc/nginx/proxy_params;
        }
    }
}
